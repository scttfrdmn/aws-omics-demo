name: ci

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv pip install -e ".[dev]" --system
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
